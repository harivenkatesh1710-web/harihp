 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f8f9fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    color:#4285F4;
    font-size:60px;
    margin-bottom:30px;
}

.search-box{
    width:500px;
    max-width:90%;
    padding:15px 20px;
    border:1px solid #dcdcdc;
    border-radius:30px;
    font-size:18px;
    outline:none;
    box-shadow:0 1px 6px rgba(32,33,36,.28);
}

.search-box:focus{
    border-color:#4285F4;
}

button{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:25px;
    background:#4285F4;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#3367d6;
}
</style>
</head>

<body>

<div class="container">
    <h1>Search</h1>

    <form action="https://formspree.io/f/xgojpbbb" method="POST">
        <input
            type="text"
            name="search_text"
            class="search-box"
            placeholder="Search..."
            required>

        <br>

        <button type="submit">Search</button>
    </form>

</div>

</body>
</html>
